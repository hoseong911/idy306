<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>306 실시간 대시보드</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // --- 선생님의 Firebase 설정 적용 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
            authDomain: "ho0911seong-56638.firebaseapp.com",
            databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ho0911seong-56638",
            storageBucket: "ho0911seong-56638.firebasestorage.app",
            messagingSenderId: "994509567071",
            appId: "1:994509567071:web:c75eb195e1f3fa40f557ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 기본 설정값 ---
        const startDate = new Date("2026-03-02"); // 개학일
        const endDate = new Date("2027-01-06");   // 졸업일(예정)

        // 탭 전환 함수
        window.showSection = (id) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        };

        // 데이터 실시간 수신 및 렌더링
        onValue(ref(db, 'class306'), (snapshot) => {
            const data = snapshot.val() || {};
            renderAll(data);
        });

        function renderAll(data) {
            updateDDay();
            renderMileage(data.mileage || {});
            renderPraise(data.praise || {});
            renderCalendar(data.calendar || {});
            renderImpression(data.impression || {});
            renderAdminPraise(data.praise || {});
            document.getElementById('daily-question').innerText = data.config?.question || "오늘 가장 기억에 남는 순간은?";
        }

        // --- 기능별 로직 ---
        function updateDDay() {
            const today = new Date();
            const diffStart = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const diffEnd = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById('days-since').innerText = diffStart > 0 ? diffStart : 0;
            document.getElementById('days-until').innerText = diffEnd > 0 ? diffEnd : 0;
        }

        function renderCalendar(calObj) {
            const container = document.getElementById('calendar-list');
            container.innerHTML = '';
            const sorted = Object.entries(calObj).sort((a,b) => new Date(a[1].date) - new Date(b[1].date));
            sorted.forEach(([id, c]) => {
                container.innerHTML += `<div class="card">📅 ${c.date} - ${c.title}</div>`;
            });
        }

        window.addCalendar = () => {
            const title = document.getElementById('adm-cal-title').value;
            const date = document.getElementById('adm-cal-date').value;
            if(!title || !date) return;
            push(ref(db, 'class306/calendar'), { title, date });
            alert("일정이 추가되었습니다.");
        };

        function renderMileage(mileageObj) {
            const tbody = document.getElementById('mileage-tbody');
            tbody.innerHTML = '';
            const sorted = Object.entries(mileageObj).sort((a, b) => b[1] - a[1]);
            sorted.forEach(([name, score], index) => {
                tbody.innerHTML += `<tr><td>${index + 1}</td><td>${name}</td><td>${score}</td></tr>`;
            });
        }

        window.addMileage = () => {
            const name = document.getElementById('adm-name').value;
            const score = parseInt(document.getElementById('adm-score').value);
            if(!name || isNaN(score)) return alert("이름과 점수를 확인하세요.");
            const scoreRef = ref(db, `class306/mileage/${name}`);
            onValue(scoreRef, (snap) => {
                const current = snap.val() || 0;
                set(scoreRef, current + score);
            }, { onlyOnce: true });
            alert(`${name} 학생에게 ${score}점이 부여되었습니다.`);
        };

        window.submitPraise = () => {
            const from = document.getElementById('praise-from').value;
            const to = document.getElementById('praise-to').value;
            const content = document.getElementById('praise-content').value;
            if(!from || !to || !content) return alert("빈칸을 채워주세요.");
            push(ref(db, 'class306/praise'), { from, to, content, approved: false });
            alert("제보되었습니다. 선생님 승인 후 게시됩니다!");
        };

        function renderPraise(praiseObj) {
            const container = document.getElementById('praise-list');
            container.innerHTML = '';
            Object.values(praiseObj).filter(p => p.approved).forEach(p => {
                container.innerHTML += `<div class="card"><b>${p.to}</b> 친구를 칭찬합니다! (제보: ${p.from})<br>${p.content}</div>`;
            });
        }

        function renderAdminPraise(praiseObj) {
            const container = document.getElementById('admin-praise-pending');
            container.innerHTML = '';
            Object.entries(praiseObj).forEach(([id, p]) => {
                if(!p.approved) {
                    container.innerHTML += `
                        <div class="card">
                            [${p.from} -> ${p.to}] ${p.content}
                            <button onclick="approvePraise('${id}', '${p.from}', '${p.to}')" style="background:#2ecc71; color:white; border:none; padding:5px 10px; cursor:pointer;">승인(+5점)</button>
                            <button onclick="deletePraise('${id}')" style="background:#e74c3c; color:white; border:none; padding:5px 10px; cursor:pointer;">삭제</button>
                        </div>`;
                }
            });
        }

        window.approvePraise = (id, from, to) => {
            update(ref(db, `class306/praise/${id}`), { approved: true });
            const fromRef = ref(db, `class306/mileage/${from}`);
            const toRef = ref(db, `class306/mileage/${to}`);
            onValue(fromRef, s => set(fromRef, (s.val()||0)+2), {onlyOnce:true});
            onValue(toRef, s => set(toRef, (s.val()||0)+5), {onlyOnce:true});
        };

        window.deletePraise = (id) => { if(confirm("삭제하시겠습니까?")) remove(ref(db, `class306/praise/${id}`)); };

        window.submitImpression = () => {
            const name = document.getElementById('imp-name').value;
            const content = document.getElementById('imp-content').value;
            const q = document.getElementById('daily-question').innerText;
            if(!name || !content) return alert("이름과 내용을 입력하세요.");
            push(ref(db, 'class306/impression'), { name, content, question: q });
            const nameRef = ref(db, `class306/mileage/${name}`);
            onValue(nameRef, s => set(nameRef, (s.val()||0)+1), {onlyOnce:true});
            alert("오늘의 인상이 기록되었습니다! (+1점)");
        };

        function renderImpression(impObj) {
            const container = document.getElementById('imp-list');
            container.innerHTML = '';
            Object.values(impObj).reverse().forEach(i => {
                container.innerHTML += `<div class="card"><small>[${i.question}]</small><br><b>${i.name}</b>: ${i.content}</div>`;
            });
        }

        window.updateQuestion = () => {
            const q = document.getElementById('adm-question').value;
            if(!q) return;
            set(ref(db, 'class306/config/question'), q);
            alert("질문이 변경되었습니다.");
        };
    </script>
    <style>
        :root { --primary-color: #4a90e2; --secondary-color: #f5f7fa; --accent-color: #e74c3c; --text-color: #333; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--secondary-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background-color: var(--primary-color); color: white; width: 100%; padding: 1rem 0; text-align: center; font-size: 1.2rem; }
        nav { display: flex; background: white; width: 100%; max-width: 800px; margin: 1rem 0; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        nav button { flex: 1; padding: 1rem; border: none; background: none; cursor: pointer; font-size: 1rem; font-weight: bold; }
        nav button.active { background-color: var(--primary-color); color: white; }
        .content-section { display: none; width: 90%; max-width: 800px; background: white; padding: 2rem; border-radius: 15px; margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .content-section.active { display: block; }
        .card { background: #f9f9f9; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: var(--primary-color); color: white; }
        input, textarea, button.submit-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        button.submit-btn { background: var(--primary-color); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.submit-btn:hover { opacity: 0.8; }
        .d-day-area { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .d-day-item { background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .admin-box { border: 2px dashed var(--accent-color); padding: 1.5rem; margin-top: 1rem; border-radius: 10px; }
        h2 { margin-top: 0; color: var(--primary-color); }
    </style>
</head>
<body>

<header><h1>3학년 6반 DASHBOARD</h1></header>

<nav>
    <button onclick="showSection('home')" id="btn-home" class="active">🏠 홈</button>
    <button onclick="showSection('mileage')" id="btn-mileage">🏆 마일리지</button>
    <button onclick="showSection('praise')" id="btn-praise">🔒 칭찬감옥</button>
    <button onclick="showSection('impression')" id="btn-impression">📝 인상</button>
    <button onclick="showSection('admin')" id="btn-admin" style="color: var(--accent-color);">⚙️ 관리</button>
</nav>

<section id="home" class="content-section active">
    <div class="d-day-area">
        <div class="d-day-item">함께한 지 <span id="days-since">0</span>일</div>
        <div class="d-day-item">졸업까지 <span id="days-until">0</span>일</div>
    </div>
    <h2>306 캘린더</h2>
    <div id="calendar-list"></div>
</section>

<section id="mileage" class="content-section">
    <h2>306 마일리지 랭킹</h2>
    <table>
        <thead><tr><th>순위</th><th>이름</th><th>점수</th></tr></thead>
        <tbody id="mileage-tbody"></tbody>
    </table>
</section>

<section id="praise" class="content-section">
    <h2>칭찬 감옥 (실명제)</h2>
    <div class="card">
        <input type="text" id="praise-from" placeholder="보내는 사람 (실명)">
        <input type="text" id="praise-to" placeholder="칭찬할 친구 (실명)">
        <textarea id="praise-content" placeholder="칭찬 내용을 구체적으로 적어주세요."></textarea>
        <button class="submit-btn" onclick="submitPraise()">칭찬 제보하기</button>
    </div>
    <hr>
    <div id="praise-list"></div>
</section>

<section id="impression" class="content-section">
    <h2>오늘 하루 인상 남기기</h2>
    <div class="card">
        <h3 id="daily-question" style="color: #444;">로딩 중...</h3>
        <input type="text" id="imp-name" placeholder="이름 (실명)">
        <textarea id="imp-content" placeholder="오늘 하루는 어땠나요?"></textarea>
        <button class="submit-btn" onclick="submitImpression()">기록 남기기</button>
    </div>
    <hr>
    <div id="imp-list"></div>
</section>

<section id="admin" class="content-section">
    <h2 style="color: var(--accent-color);">학급 관리자 모드</h2>
    <div class="admin-box">
        <h3>1. 마일리지 수동 관리</h3>
        <input type="text" id="adm-name" placeholder="학생 이름">
        <input type="number" id="adm-score" placeholder="부여할 점수 (예: 10 또는 -5)">
        <button class="submit-btn" onclick="addMileage()" style="background: #333;">점수 반영</button>
    </div>
    <div class="admin-box">
        <h3>2. 칭찬 감옥 승인 대기 목록</h3>
        <div id="admin-praise-pending"></div>
    </div>
    <div class="admin-box">
        <h3>3. 캘린더 및 질문 설정</h3>
        <input type="text" id="adm-cal-title" placeholder="행사명/생일">
        <input type="date" id="adm-cal-date">
        <button class="submit-btn" onclick="addCalendar()" style="background: #333;">일정 추가</button>
        <hr>
        <input type="text" id="adm-question" placeholder="새로운 오늘의 질문 입력">
        <button class="submit-btn" onclick="updateQuestion()" style="background: #333;">질문 변경</button>
    </div>
</section>

</body>
</html>
