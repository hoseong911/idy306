    <!-- 폰트: Pretendard & Gaegu(포인트용) -->

    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
            authDomain: "ho0911seong-56638.firebaseapp.com",
            databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ho0911seong-56638",
            storageBucket: "ho0911seong-56638.firebasestorage.app",
            messagingSenderId: "994509567071",
            appId: "1:994509567071:web:c75eb195e1f3fa40f557ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        const startDate = new Date("2026-03-03");
        const endDate = new Date("2027-01-08");
        const ADMIN_PW = "1234";
        const studentList = ["강예울","김가윤","김근형","김도현","김보배","김시우","김주하","김지호","김태훈","김하음","문지민","박나윤","박민호","박지민","신주현","이규연","이시원","이예준","이준서","임은교","임주호","장민혁","제윤아","조하연","최강유","최도윤","최성현"];
        const holidays = ["2026-01-01","2026-01-28","2026-01-29","2026-01-30","2026-03-01","2026-05-05","2026-05-25","2026-06-06","2026-08-15","2026-09-24","2026-09-25","2026-09-26","2026-10-03","2026-10-09","2026-12-25"];

        const CLAUDE_API_KEY = "여기에_Claude_API_키_입력";
        const MAX_DAILY_CERT = 1;
        const CERT_MILEAGE = 3;

        let globalData = {};
        let adminLoggedIn = false;

        // [이하 기존 JS 로직 유지 - 섹션 전환, 모달, Firebase 수신 등]
        window.showSection = (id) => {
            if (id === 'admin' && !adminLoggedIn) { showAdminModal(); return; }
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav .nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        };

        window.showSubTab = (btn, sectionId, tabId) => {
            const section = document.getElementById(sectionId);
            section.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            section.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        };

        window.showAdminModal = () => {
            document.getElementById('admin-modal').classList.add('open');
            document.getElementById('admin-pw-input').value = '';
            setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
        };
        window.closeAdminModal = () => document.getElementById('admin-modal').classList.remove('open');
        window.tryAdminLogin = () => {
            const pw = document.getElementById('admin-pw-input').value;
            if (pw === ADMIN_PW) {
                adminLoggedIn = true;
                closeAdminModal();
                showSection('admin');
                showAdminTab(document.querySelector('.adm-tab-btn'), 'adm-home');
            } else {
                document.getElementById('admin-pw-input').classList.add('shake');
                setTimeout(() => document.getElementById('admin-pw-input').classList.remove('shake'), 500);
            }
        };

        onValue(ref(db, 'class306'), (snapshot) => {
            globalData = snapshot.val() || {};
            renderHome(globalData.calendar || {});
            renderMileage(globalData.mileage || {});
            renderPraise(globalData.praise || {});
            renderToday(globalData.impression || {});
            renderAdminHome(globalData.calendar || {});
            renderAdminMileage(globalData);
            renderAdminPraise(globalData.praise || {});
            renderAdminToday(globalData.impression || {});
            renderMileageGuide(globalData.config || {});
            renderAdminStudyCert(globalData.studyCert || {});
            renderStudyCertHistory(globalData.studyCert || {});
            populateDropdowns();
            const todayStr = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
            if (document.getElementById('display-date')) document.getElementById('display-date').innerText = todayStr;
        });

        // [기존 함수 생략: renderHome, getLevel, renderMileage, submitStudyCert 등은 기존 코드와 동일하게 삽입]
        // (지면 관계상 핵심 디자인 변경을 위한 CSS와 레이아웃 구조 위주로 기술합니다)
    </script>

    <style>
        :root {
            /* 시원한 민트 & 블루 스킴 */
            --primary: #2DD4BF; 
            --secondary: #38BDF8;
            --accent: #F472B6;
            --mint-light: #F0FDFA;
            --blue-light: #F0F9FF;
            --study: #6366F1;
            --bg: #F8FAFC;
            --card: rgba(255, 255, 255, 0.85);
            --text: #0F172A;
            --text-sub: #64748B;
            --border: rgba(226, 232, 240, 0.8);
            --grad: linear-gradient(135deg, #2DD4BF 0%, #38BDF8 100%);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --radius: 24px;
            --max-w: 600px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 60px;
            letter-spacing: -0.02em;
        }

        header { padding: 40px 0 20px; text-align: center; }
        h1 { 
            font-weight: 900; 
            font-size: 2.5rem; 
            background: var(--grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -0.05em;
        }

        nav { 
            display: flex; gap: 8px; margin: 0 auto 24px; flex-wrap: wrap; 
            justify-content: center; max-width: var(--max-w); padding: 0 16px;
        }
        .nav-btn { 
            padding: 12px 18px; border: none; border-radius: 16px; background: white; 
            box-shadow: var(--shadow); cursor: pointer; font-weight: 700; color: var(--text-sub); 
            font-size: 0.9rem; transition: all 0.2s; 
        }
        .nav-btn.active { background: var(--text); color: white; }

        .class-total-banner { 
            width: calc(100% - 32px); max-width: var(--max-w); 
            background: var(--grad); color: white; padding: 22px; 
            border-radius: var(--radius); margin: 0 auto 20px; box-shadow: var(--shadow); 
        }
        .progress-bar { background: rgba(255,255,255,0.3); height: 10px; border-radius: 5px; }
        .progress-fill { background: white; height: 100%; border-radius: 5px; }

        .content-section { width: calc(100% - 32px); max-width: var(--max-w); margin: 0 auto; }
        .glass-card { 
            background: var(--card); border-radius: var(--radius); padding: 24px; 
            box-shadow: var(--shadow); border: 1px solid var(--border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            margin-bottom: 16px;
        }

        /* 탭 디자인 */
        .sub-nav button { color: var(--text-sub); font-weight: 800; border-bottom: 3px solid transparent; }
        .sub-nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* 입력 폼 */
        input, select, textarea { 
            background: #F1F5F9; border: 1px solid transparent; 
            padding: 14px; border-radius: 16px; transition: all 0.2s;
        }
        input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.1); }

        .btn-main { 
            background: var(--text); color: white; border-radius: 18px; 
            font-weight: 800; padding: 16px; transition: transform 0.2s;
        }
        .btn-main:hover { transform: scale(1.02); }

        /* 랭킹 카드 */
        .rank-card { background: white; border: 1px solid var(--border); border-radius: 20px; }
        .rank-lv-badge { color: var(--primary); border-color: var(--primary); }

        /* 스터디 체크 */
        .cert-upload-area { border: 2px dashed var(--secondary); background: var(--blue-light); color: var(--secondary); }
        .btn-study-main { background: var(--study); }
    </style>
</head>
<body>
    <!-- 레이아웃 구조는 기존과 동일하게 유지하되 위 스타일이 적용됩니다 -->
    <header><h1>INTO THE 306 WORLD</h1></header>
    <nav>
        <button class="nav-btn active" onclick="showSection('home')" id="btn-home">🏠 홈</button>
        <button class="nav-btn" onclick="showSection('mileage')" id="btn-mileage">⭐ 마일리지</button>
        <button class="nav-btn" onclick="showSection('study')" id="btn-study">📚 스터디</button>
        <button class="nav-btn" onclick="showSection('praise')" id="btn-praise">🌟 칭찬감옥</button>
        <button class="nav-btn" onclick="showSection('today')" id="btn-today">✏️ 기록</button>
        <button class="nav-btn" onclick="showSection('admin')" id="btn-admin">⚙️</button>
    </nav>
    <!-- [이하 기존 바디 태그 내용들] -->
</body>
</html>
