<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>306 Class Dashboard</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
            authDomain: "ho0911seong-56638.firebaseapp.com",
            databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ho0911seong-56638",
            storageBucket: "ho0911seong-56638.firebasestorage.app",
            messagingSenderId: "994509567071",
            appId: "1:994509567071:web:c75eb195e1f3fa40f557ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 환경 설정 ---
        const startDate = new Date("2026-03-03");
        const endDate = new Date("2027-01-08");

        // --- 내비게이션 & 탭 로직 ---
        window.showSection = (id) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        };

        window.showSubTab = (sectionId, tabId) => {
            const section = document.getElementById(sectionId);
            section.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            section.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        };

        // --- 데이터 실시간 동기화 ---
        onValue(ref(db, 'class306'), (snapshot) => {
            const data = snapshot.val() || {};
            renderHome(data.calendar || {});
            renderMileage(data.mileage || {});
            renderPraise(data.praise || {});
            renderToday(data.impression || {});
            renderAdmin(data);
            document.getElementById('daily-q-text').innerText = data.config?.question || "오늘 하루, 당신을 미소 짓게 한 일은?";
        });

        // --- 1. 홈 & 디데이 ---
        function renderHome(calObj) {
            const today = new Date();
            const diffStart = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const diffEnd = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById('d-day-start').innerText = diffStart;
            document.getElementById('d-day-end').innerText = diffEnd;

            const container = document.getElementById('cal-list');
            container.innerHTML = '';
            Object.entries(calObj).sort((a,b) => new Date(a[1].date) - new Date(b[1].date)).forEach(([id, c]) => {
                container.innerHTML += `<div class="glass-card"><span>${c.date}</span> <strong>${c.title}</strong></div>`;
            });
        }

        // --- 2. 마일리지 ---
        function renderMileage(mileageObj) {
            const tbody = document.getElementById('mileage-rank-list');
            tbody.innerHTML = '';
            const sorted = Object.entries(mileageObj).sort((a, b) => b[1] - a[1]);
            sorted.forEach(([name, score], index) => {
                tbody.innerHTML += `<div class="rank-item"><span>${index+1}위. ${name}</span> <strong>${score} P</strong></div>`;
            });
        }

        // --- 3. 칭찬 감옥 ---
        window.submitPraise = () => {
            const from = document.getElementById('p-from').value;
            const to = document.getElementById('p-to').value;
            const content = document.getElementById('p-content').value;
            if(!from || !to || !content) return alert("내용을 입력해주세요.");
            push(ref(db, 'class306/praise'), { from, to, content, approved: false, date: new Date().toLocaleDateString() });
            alert("제보 완료! 선생님 승인 후 공개됩니다.");
        };

        function renderPraise(praiseObj) {
            const container = document.getElementById('praise-view-list');
            container.innerHTML = '';
            Object.values(praiseObj).filter(p => p.approved).reverse().forEach(p => {
                container.innerHTML += `<div class="glass-card praise"><b>${p.to}</b> 친구를 칭찬합니다!<br><small>${p.content}</small><div class='from'>- 제보자: ${p.from}</div></div>`;
            });
        }

        // --- 4. 오늘 하루 ---
        window.submitToday = () => {
            const name = document.getElementById('t-name').value;
            const content = document.getElementById('t-content').value;
            const q = document.getElementById('daily-q-text').innerText;
            if(!name || !content) return alert("이름과 내용을 입력하세요.");
            push(ref(db, 'class306/impression'), { name, content, question: q, date: new Date().toLocaleDateString() });
            alert("기록 완료!");
        };

        function renderToday(impObj) {
            const container = document.getElementById('today-view-list');
            container.innerHTML = '';
            const grouped = {};
            Object.values(impObj).forEach(i => {
                if(!grouped[i.date]) grouped[i.date] = { q: i.question, a: [] };
                grouped[i.date].a.push(i);
            });
            Object.entries(grouped).reverse().forEach(([date, data]) => {
                let html = `<div class='date-group'><h4>📅 ${date}</h4><p class='q-title'>질문: ${data.q}</p>`;
                data.a.forEach(ans => { html += `<div class='ans-item'><b>${ans.name}</b>: ${ans.content}</div>`; });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        // --- 5. 어드민 (선생님용) ---
        function renderAdmin(data) {
            const pending = document.getElementById('adm-praise-pending');
            pending.innerHTML = '';
            const praiseObj = data.praise || {};
            Object.entries(praiseObj).forEach(([id, p]) => {
                if(!p.approved) {
                    pending.innerHTML += `<div class='glass-card'>[${p.from}->${p.to}] ${p.content} <button onclick="approvePraise('${id}','${p.from}','${p.to}')">승인</button></div>`;
                }
            });
        }

        window.approvePraise = (id, from, to) => {
            update(ref(db, `class306/praise/${id}`), { approved: true });
            // 자동 점수: 제보자 2, 주인공 5
            const mRef = ref(db, 'class306/mileage');
            onValue(mRef, snap => {
                const cur = snap.val() || {};
                update(mRef, { [from]: (cur[from]||0)+2, [to]: (cur[to]||0)+5 });
            }, {onlyOnce:true});
        };

        window.addCalendar = () => {
            const title = document.getElementById('adm-c-t').value;
            const date = document.getElementById('adm-c-d').value;
            push(ref(db, 'class306/calendar'), { title, date });
        };

        window.updateQuestion = () => {
            const q = document.getElementById('adm-q').value;
            set(ref(db, 'class306/config/question'), q);
        };

        window.addStudentMileage = () => {
            const name = document.getElementById('adm-m-n').value;
            const score = parseInt(document.getElementById('adm-m-s').value);
            const mRef = ref(db, `class306/mileage/${name}`);
            onValue(mRef, s => set(mRef, (s.val()||0)+score), {onlyOnce:true});
        };

    </script>
    <style>
        :root {
            --mint: #b2f2bb;
            --pink: #ffc9c9;
            --main-grad: linear-gradient(135deg, #e6fbfe 0%, #edeffd 100%);
            --point-grad: linear-gradient(90deg, #98FFD9 0%, #FFC2D1 100%);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--main-grad);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: #444;
        }

        header {
            width: 100%; padding: 40px 0;
            text-align: center;
        }

        h1 {
            font-weight: 800; font-size: 2.2rem; margin: 0;
            background: var(--point-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex; gap: 10px; margin-bottom: 30px;
        }

        nav button {
            padding: 10px 20px; border: none; border-radius: 20px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px); cursor: pointer;
            font-weight: 600; transition: 0.3s;
        }

        nav button.active {
            background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: #ff85a1;
        }

        .content-section {
            display: none; width: 90%; max-width: 600px;
            animation: fadeIn 0.5s ease;
        }

        .content-section.active { display: block; }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px; margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
        }

        h2 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; }

        /* 서브 탭 스타일 */
        .sub-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .sub-nav button {
            background: none; border: none; font-size: 1rem; color: #999;
            cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent;
        }
        .sub-nav button.active { color: #333; border-bottom: 2px solid #98FFD9; font-weight: bold; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 디데이 */
        .d-day-wrap { display: flex; justify-content: space-around; margin-bottom: 30px; }
        .d-day-box { text-align: center; }
        .d-day-box div { font-size: 0.9rem; color: #888; }
        .d-day-box strong { font-size: 1.8rem; color: #ff85a1; }

        /* 입력창 스타일 */
        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; border: 1px solid #eee;
            box-sizing: border-box; font-family: inherit;
        }
        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: var(--point-grad); color: white; font-weight: bold;
            cursor: pointer; font-size: 1rem;
        }

        /* 리스트 아이템 */
        .rank-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .ans-item { padding: 10px; background: rgba(255,255,255,0.4); border-radius: 10px; margin-top: 5px; }
        .date-group { margin-bottom: 30px; }
        .q-title { font-weight: bold; color: #4a90e2; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>306 CLASS DASHBOARD</h1>
</header>

<nav>
    <button onclick="showSection('home')" id="btn-home" class="active">🏠 홈</button>
    <button onclick="showSection('mileage')" id="btn-mileage">🏆 마일리지</button>
    <button onclick="showSection('praise')" id="btn-praise">🔒 칭찬감옥</button>
    <button onclick="showSection('today')" id="btn-today">📝 오늘 하루</button>
    <button onclick="showSection('admin')" id="btn-admin" style="color:#ff85a1">⚙️</button>
</nav>

<section id="home" class="content-section active">
    <div class="glass-card">
        <div class="d-day-wrap">
            <div class="d-day-box"><div>함께한 지</div><strong id="d-day-start">0</strong>일</div>
            <div class="d-day-box"><div>졸업까지</div><strong id="d-day-end">0</strong>일</div>
        </div>
        <h2>306 캘린더</h2>
        <div id="cal-list"></div>
    </div>
</section>

<section id="mileage" class="content-section">
    <div class="sub-nav">
        <button class="active" onclick="showSubTab('mileage','m-method')">적립 방법</button>
        <button onclick="showSubTab('mileage','m-rank')">실시간 랭킹</button>
    </div>
    <div id="m-method" class="tab-content active">
        <div class="glass-card">
            <h2>마일리지 적립 가이드</h2>
            <p style="text-align: center; color: #888;">(여기에 적립 방법을 입력하세요. 어드민에서 일괄 적립됩니다.)</p>
        </div>
    </div>
    <div id="m-rank" class="tab-content">
        <div class="glass-card">
            <h2>306 명예의 전당</h2>
            <div id="mileage-rank-list"></div>
        </div>
    </div>
</section>

<section id="praise" class="content-section">
    <div class="sub-nav">
        <button class="active" onclick="showSubTab('praise','p-send')">제보하기</button>
        <button onclick="showSubTab('praise','p-view')">모아보기</button>
    </div>
    <div id="p-send" class="tab-content active">
        <div class="glass-card">
            <h2>칭찬 제보</h2>
            <input type="text" id="p-from" placeholder="제보자 이름">
            <input type="text" id="p-to" placeholder="칭찬 주인공 이름">
            <textarea id="p-content" placeholder="친구의 멋진 점을 적어주세요."></textarea>
            <button class="btn-main" onclick="submitPraise()">제보 완료</button>
        </div>
    </div>
    <div id="p-view" class="tab-content">
        <div id="praise-view-list"></div>
    </div>
</section>

<section id="today" class="content-section">
    <div class="sub-nav">
        <button class="active" onclick="showSubTab('today','t-write')">오늘의 질문</button>
        <button onclick="showSubTab('today','t-view')">모아보기</button>
    </div>
    <div id="t-write" class="tab-content active">
        <div class="glass-card">
            <h2 id="daily-q-text">질문을 불러오는 중...</h2>
            <input type="text" id="t-name" placeholder="본인 이름">
            <textarea id="t-content" placeholder="답변을 적어주세요."></textarea>
            <button class="btn-main" onclick="submitToday()">기록하기</button>
        </div>
    </div>
    <div id="t-view" class="tab-content">
        <div id="today-view-list"></div>
    </div>
</section>

<section id="admin" class="content-section">
    <div class="glass-card">
        <h2>선생님 관리 도구</h2>
        <div class="admin-box">
            <h4>마일리지 일괄/개별 적립</h4>
            <input type="text" id="adm-m-n" placeholder="학생 이름">
            <input type="number" id="adm-m-s" placeholder="점수 (예: 10)">
            <button onclick="addStudentMileage()">적립</button>
        </div>
        <hr>
        <h4>칭찬 승인 대기</h4>
        <div id="adm-praise-pending"></div>
        <hr>
        <h4>오늘의 질문 변경</h4>
        <input type="text" id="adm-q" placeholder="새로운 질문 입력">
        <button onclick="updateQuestion()">변경</button>
        <hr>
        <h4>일정 추가</h4>
        <input type="text" id="adm-c-t" placeholder="행사명">
        <input type="date" id="adm-c-d">
        <button onclick="addCalendar()">추가</button>
    </div>
</section>

</body>
</html>
