<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTO THE 306 WORLD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
            authDomain: "ho0911seong-56638.firebaseapp.com",
            databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ho0911seong-56638",
            storageBucket: "ho0911seong-56638.firebasestorage.app",
            messagingSenderId: "994509567071",
            appId: "1:994509567071:web:c75eb195e1f3fa40f557ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const startDate = new Date("2026-03-03");
        const endDate = new Date("2027-01-08");
        const ADMIN_PW = "1234";

        // 학생 명단
        const studentList = ["강예울", "김가윤", "김근형", "김도현", "김보배", "김시우", "김주하", "김지호", "김태훈", "김하음", "문지민", "박나윤", "박민호", "박지민", "신주현", "이규연", "이시원", "이예준", "이준서", "임은교", "임주호", "장민혁", "제윤아", "조하연", "최강유", "최도윤", "최성현"];

        const reasonScoreMap = {
            "칭찬 감옥 제보": 1, "칭찬 주인공 선정": 2, "오늘 하루 기록": 1,
            "완벽한 청소": 1, "선행(보통)": 1, "선행(우수)": 2, "선행(최고)": 3,
            "봉사(보통)": 1, "봉사(우수)": 2, "봉사(최고)": 3, "기타(직접 입력)": 0
        };

        window.showSection = (id) => {
            if (id === 'admin') {
                const pw = prompt("관리자 비밀번호를 입력하세요.");
                if (pw !== ADMIN_PW) return alert("비밀번호 불일치!");
            }
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav > button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        };

        window.showSubTab = (btn, sectionId, tabId) => {
            const section = document.getElementById(sectionId);
            section.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            section.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        };

        onValue(ref(db, 'class306'), (snapshot) => {
            const data = snapshot.val() || {};
            renderHome(data.calendar || {});
            renderMileage(data.mileage || {});
            renderPraise(data.praise || {});
            renderToday(data.impression || {});
            renderAdminTools(data);
            
            const todayStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
            if(document.getElementById('display-date')) document.getElementById('display-date').innerText = todayStr;
            if(document.getElementById('daily-q-text')) document.getElementById('daily-q-text').innerText = data.config?.question || "오늘 하루 어땠나요?";
        });

        function renderHome(calObj) {
            const today = new Date();
            const diffStart = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const diffEnd = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById('d-day-start').innerText = diffStart > 0 ? diffStart : 0;
            document.getElementById('d-day-end').innerText = diffEnd > 0 ? diffEnd : 0;

            const container = document.getElementById('cal-list');
            if(!container) return;
            container.innerHTML = '';
            const threeWeeks = new Date(); threeWeeks.setDate(today.getDate() + 21);
            const sorted = Object.entries(calObj).filter(([id, c]) => { const d = new Date(c.date); return d >= today && d <= threeWeeks; }).sort((a,b) => new Date(a[1].date) - new Date(b[1].date));
            if(sorted.length === 0) container.innerHTML = "<p class='empty-msg'>향후 3주간 일정이 없습니다.</p>";
            sorted.forEach(([id, c]) => { container.innerHTML += `<div class="glass-card cal-item"><span>${c.date}</span> <strong>${c.title}</strong></div>`; });
        }

        function renderMileage(mileageObj) {
            const tbody = document.getElementById('mileage-rank-list');
            if(!tbody) return;
            tbody.innerHTML = '';
            Object.entries(mileageObj).sort((a,b) => b[1]-a[1]).forEach(([name, score], idx) => {
                tbody.innerHTML += `<div class="list-item"><span>${idx+1}위. ${name}</span> <strong>${score} P</strong></div>`;
            });
        }

        window.submitPraise = () => {
            const from = document.getElementById('p-from').value;
            const to = document.getElementById('p-to').value;
            const content = document.getElementById('p-content').value;
            if(!from || !to || !content) return alert("내용을 입력하세요.");
            push(ref(db, 'class306/praise'), { from, to, content, approved: false, time: new Date().toLocaleString('ko-KR') });
            alert("선생님께 전달되었습니다!");
        };

        function renderPraise(praiseObj) {
            const container = document.getElementById('praise-view-list');
            if(!container) return;
            container.innerHTML = '';
            Object.values(praiseObj).filter(p => p.approved).reverse().forEach(p => {
                container.innerHTML += `<div class="glass-card praise-card"><b>${p.to}</b> 친구를 칭찬합니다!<br><p>${p.content}</p><small>- 제보자: ${p.from}</small></div>`;
            });
        }

        window.submitToday = () => {
            const name = document.getElementById('t-name').value;
            const content = document.getElementById('t-content').value;
            if(!name || !content) return alert("이름과 답변을 입력하세요.");
            push(ref(db, 'class306/impression'), { name, content, question: document.getElementById('daily-q-text').innerText, date: new Date().toLocaleDateString() });
            const mRef = ref(db, `class306/mileage/${name}`);
            onValue(mRef, s => set(mRef, (s.val()||0)+1), {onlyOnce:true}); // 오늘 하루 기록 +1
            alert("기록 완료! (+1점)");
        };

        function renderToday(impObj) {
            const container = document.getElementById('today-view-list');
            if(!container) return;
            container.innerHTML = '';
            const grouped = {};
            Object.values(impObj).forEach(i => { if(!grouped[i.date]) grouped[i.date] = { q: i.question, a: [] }; grouped[i.date].a.push(i); });
            Object.entries(grouped).reverse().forEach(([date, data]) => {
                let html = `<div class='date-group'><h4>📅 ${date}</h4><p class='q-box'>Q. ${data.q}</p>`;
                data.a.forEach(ans => { html += `<div class='ans-item'><b>${ans.name}</b>: ${ans.content}</div>`; });
                container.innerHTML += html + `</div>`;
            });
        }

        function renderAdminTools(data) {
            const stSelect = document.getElementById('adm-m-st-select');
            const pending = document.getElementById('adm-praise-pending');
            if(stSelect) {
                stSelect.innerHTML = '<option value="">개별 학생 선택</option>';
                Object.keys(data.students || {}).sort().forEach(name => { stSelect.innerHTML += `<option value="${name}">${name}</option>`; });
            }
            if(pending) {
                pending.innerHTML = '';
                Object.entries(data.praise || {}).forEach(([id, p]) => {
                    if(!p.approved) {
                        pending.innerHTML += `
                        <div class='list-item admin-praise-item'>
                            <small>${p.time}</small>
                            <div><b>[${p.from}→${p.to}]</b> ${p.content}</div>
                            <button onclick="approvePraise('${id}','${p.from}','${p.to}')">승인</button>
                        </div>`;
                    }
                });
            }
        }

        window.syncClass = () => {
            if(!confirm("306반 명단을 초기화/동기화하시겠습니까?")) return;
            studentList.forEach(name => { set(ref(db, `class306/students/${name}`), true); });
            alert("명단 동기화 완료!");
        };

        window.updateAdminScore = () => {
            const reason = document.getElementById('adm-m-reason').value;
            document.getElementById('adm-m-score').value = reasonScoreMap[reason] || 0;
        };

        window.processMileage = () => {
            const selectVal = document.getElementById('adm-m-st-select').value;
            const inputVal = document.getElementById('adm-m-st-input').value;
            const score = parseInt(document.getElementById('adm-m-score').value);
            let targets = [];
            if(selectVal) targets.push(selectVal);
            if(inputVal) targets = targets.concat(inputVal.split(',').map(s => s.trim()).filter(s => s));
            if(targets.length === 0 || isNaN(score)) return alert("학생과 점수를 확인하세요.");
            targets.forEach(name => { const refM = ref(db, `class306/mileage/${name}`); onValue(refM, s => set(refM, (s.val()||0)+score), {onlyOnce:true}); });
            alert("적립 완료!");
        };

        window.processGroupMileage = (score, reason) => {
            if(!confirm(`[${reason}] 전체 학생에게 ${score}점을 적립하시겠습니까?`)) return;
            const mRef = ref(db, 'class306/mileage');
            onValue(mRef, snap => {
                const cur = snap.val() || {};
                const updates = {};
                studentList.forEach(name => { updates[name] = (cur[name] || 0) + score; });
                update(mRef, updates);
            }, {onlyOnce:true});
            alert("단체 적립 완료!");
        };

        window.approvePraise = (id, from, to) => {
            update(ref(db, `class306/praise/${id}`), { approved: true });
            const mRef = ref(db, 'class306/mileage');
            onValue(mRef, snap => {
                const cur = snap.val() || {};
                update(mRef, { [from]: (cur[from]||0)+1, [to]: (cur[to]||0)+2 });
            }, {onlyOnce:true});
            alert("승인 완료! (제보자 +1, 주인공 +2)");
        };

        window.addBulkCal = () => {
            const lines = document.getElementById('adm-cal-bulk').value.split('\n');
            lines.forEach(line => { const [date, title] = line.split(':').map(s => s.trim()); if(date && title) push(ref(db, 'class306/calendar'), { date, title }); });
            alert("일정 등록 완료!");
        };

        window.autoGenQ = () => { document.getElementById('adm-q-input').value = ["오늘 가장 웃겼던 일은?", "나의 오늘을 한 단어로 표현하면?", "오늘 나에게 해주고 싶은 말은?", "방과 후에 가장 하고 싶은 것은?"][Math.floor(Math.random()*4)]; };
        window.updateQ = () => { const q = document.getElementById('adm-q-input').value; if(q) set(ref(db, 'class306/config/question'), q); alert("변경 완료!"); };
    </script>
    <style>
        :root { --mint: #98FFD9; --pink: #FFC2D1; --header-grad: linear-gradient(135deg, #FF6B6B 0%, #FFD93D 100%); }
        body { font-family: 'Pretendard', sans-serif; background: #fdfdfd; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #444; }
        header { padding: 60px 0 30px; text-align: center; width: 100%; }
        h1 { font-weight: 900; font-size: 3.5rem; margin: 0; background: var(--header-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.1)); text-align: center; }
        nav { display: flex; gap: 10px; margin-bottom: 40px; }
        nav button { padding: 12px 24px; border: none; border-radius: 25px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; font-weight: 700; color: #888; }
        nav button.active { background: #333; color: white; }
        .content-section { display: none; width: 95%; max-width: 700px; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        .sub-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .sub-nav button { background: none; border: none; font-size: 1.1rem; color: #ccc; cursor: pointer; font-weight: 700; }
        .sub-nav button.active { color: #333; border-bottom: 3px solid var(--mint); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); border-radius: 30px; padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { text-align: center; }
        .d-day-area { display: flex; justify-content: space-around; margin-bottom: 40px; }
        .d-day-box b { font-size: 2.5rem; color: #FF6B6B; display: block; }
        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; font-family: inherit; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--header-grad); color: white; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
        .btn-group { background: var(--mint); color: #333; border: none; padding: 10px; border-radius: 10px; margin: 5px; cursor: pointer; font-weight: 700; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f7f7f7; }
        .q-box { padding: 25px; background: #fffdf5; border-radius: 20px; border-left: 6px solid #FFD93D; margin-bottom: 20px; }
        .admin-box { background: #fcfcfc; padding: 20px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header><h1>INTO THE 306 WORLD</h1></header>

<nav>
    <button onclick="showSection('home')" id="btn-home" class="active">홈</button>
    <button onclick="showSection('mileage')" id="btn-mileage">마일리지</button>
    <button onclick="showSection('praise')" id="btn-praise">칭찬감옥</button>
    <button onclick="showSection('today')" id="btn-today">오늘 하루</button>
    <button onclick="showSection('admin')" id="btn-admin" style="color:#FF6B6B">관리자</button>
</nav>

<section id="home" class="content-section active">
    <div class="glass-card">
        <div class="d-day-area">
            <div class="d-day-box"><span>우리가 만난 지</span><b><span id="d-day-start">0</span>일</b></div>
            <div class="d-day-box"><span>졸업까지</span><b><span id="d-day-end">0</span>일</b></div>
        </div>
        <h2>306 캘린더 (3주)</h2>
        <div id="cal-list"></div>
    </div>
</section>

<section id="mileage" class="content-section">
    <div class="sub-nav"><button class="active" onclick="showSubTab(this,'mileage','m-view')">실시간 랭킹</button><button onclick="showSubTab(this,'mileage','m-guide')">적립 가이드</button></div>
    <div id="m-view" class="tab-content active"><div class="glass-card"><h2>🏆 명예의 전당</h2><div id="mileage-rank-list"></div></div></div>
    <div id="m-guide" class="tab-content"><div class="glass-card"><h2>마일리지 규칙</h2><p style="text-align:center; color:#888; line-height:2;">칭찬 제보: +1 / 칭찬 주인공: +2 / 오늘 하루: +1<br>청소/선행/봉사: +1~3 / 단체 미션: +2</p></div></div>
</section>

<section id="praise" class="content-section">
    <div class="sub-nav"><button class="active" onclick="showSubTab(this,'praise','p-form')">제보하기</button><button onclick="showSubTab(this,'praise','p-list')">모아보기</button></div>
    <div id="p-form" class="tab-content active"><div class="glass-card"><h2>칭찬 제보</h2><input type="text" id="p-from" placeholder="제보자 이름"><input type="text" id="p-to" placeholder="칭찬 친구"><textarea id="p-content" rows="4" placeholder="친구의 선행 제보"></textarea><button class="btn-main" onclick="submitPraise()">전송</button></div></div>
    <div id="p-list" class="tab-content"><div id="praise-view-list"></div></div>
</section>

<section id="today" class="content-section">
    <div class="sub-nav"><button class="active" onclick="showSubTab(this,'today','t-form')">오늘의 질문</button><button onclick="showSubTab(this,'today','t-list')">모아보기</button></div>
    <div id="t-form" class="tab-content active"><div class="glass-card"><div id="display-date" style="text-align:center; color:#999; margin-bottom:10px;"></div><div class="q-box"><h3 id="daily-q-text" style="margin:0; text-align:center;">불러오는 중...</h3></div><input type="text" id="t-name" placeholder="실명"><textarea id="t-content" rows="4" placeholder="당신의 답변"></textarea><button class="btn-main" onclick="submitToday()">기록</button></div></div>
    <div id="t-list" class="tab-content"><div id="today-view-list"></div></div>
</section>

<section id="admin" class="content-section">
    <div class="sub-nav"><button class="active" onclick="showSubTab(this,'admin','adm-home')">홈 관리</button><button onclick="showSubTab(this,'admin','adm-mileage')">마일리지</button><button onclick="showSubTab(this,'admin','adm-praise')">칭찬 승인</button><button onclick="showSubTab(this,'admin','adm-today')">오늘 하루</button></div>
    
    <div id="adm-home" class="tab-content active"><div class="glass-card"><div class="admin-box"><h4>명단 관리</h4><button onclick="syncClass()" style="background:#333; color:white; padding:10px; border-radius:10px; cursor:pointer;">306반 명단 동기화</button></div><div class="admin-box"><h4>일정 일괄 추가</h4><textarea id="adm-cal-bulk" rows="4" placeholder="2026-05-01: 소풍"></textarea><button onclick="addBulkCal()">일괄 등록</button></div></div></div>
    
    <div id="adm-mileage" class="tab-content"><div class="glass-card">
        <h4>단체 적립</h4>
        <button class="btn-group" onclick="processGroupMileage(2, '지각자 없음')">지각자 0명 (+2)</button>
        <button class="btn-group" onclick="processGroupMileage(2, '급식 줄 서기 우수')">급식 질서 준수 (+2)</button>
        <hr>
        <h4>개별 적립</h4>
        <select id="adm-m-st-select"></select>
        <input type="text" id="adm-m-st-input" placeholder="추가 학생 (쉼표 구분)">
        <select id="adm-m-reason" onchange="updateAdminScore()"><option value="기타(직접 입력)">사유 선택</option><option value="완벽한 청소">완벽한 청소(+1)</option><option value="선행(보통)">선행 보통(+1)</option><option value="선행(최고)">선행 최고(+3)</option><option value="봉사(보통)">봉사 보통(+1)</option><option value="봉사(최고)">봉사 최고(+3)</option></select>
        <input type="number" id="adm-m-score" placeholder="점수"><button class="btn-main" onclick="processMileage()">적립 확정</button>
    </div></div>
    
    <div id="adm-praise" class="tab-content"><div class="glass-card"><h4>승인 대기</h4><div id="adm-praise-pending"></div></div></div>
    <div id="adm-today" class="tab-content"><div class="glass-card"><h4>질문 설정</h4><input type="text" id="adm-q-input"><button onclick="autoGenQ()" style="margin-bottom:10px;">✨ 랜덤 질문</button><button class="btn-main" onclick="updateQ()">변경 확정</button></div></div>
</section>

</body>
</html>
