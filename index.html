<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTO THE 306 WORLD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
            authDomain: "ho0911seong-56638.firebaseapp.com",
            databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ho0911seong-56638",
            storageBucket: "ho0911seong-56638.firebasestorage.app",
            messagingSenderId: "994509567071",
            appId: "1:994509567071:web:c75eb195e1f3fa40f557ea"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const startDate = new Date("2026-03-03");
        const endDate = new Date("2027-01-08");
        const ADMIN_PW = "1234";
        const studentList = ["강예울", "김가윤", "김근형", "김도현", "김보배", "김시우", "김주하", "김지호", "김태훈", "김하음", "문지민", "박나윤", "박민호", "박지민", "신주현", "이규연", "이시원", "이예준", "이준서", "임은교", "임주호", "장민혁", "제윤아", "조하연", "최강유", "최도윤", "최성현"];

        window.showSection = (id) => {
            if (id === 'admin') {
                const pw = prompt("관리자 비밀번호를 입력하세요.");
                if (pw !== ADMIN_PW) return alert("비밀번호 불일치!");
            }
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav > button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        };

        window.showSubTab = (btn, sectionId, tabId) => {
            const section = document.getElementById(sectionId);
            section.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            section.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        };

        // 데이터 실시간 수신
        onValue(ref(db, 'class306'), (snapshot) => {
            const data = snapshot.val() || {};
            renderHome(data.calendar || {});
            renderMileage(data.mileage || {});
            renderPraise(data.praise || {});
            renderToday(data.impression || {});
            renderAdminTools(data);
            
            // 환경설정(적립/보상) 렌더링
            document.getElementById('display-reasons').innerText = data.config?.reasons || "칭찬제보: +1P\n오늘하루: +1P";
            document.getElementById('display-rewards').innerText = data.config?.rewards || "5P: 까까\n100P: 자리지정";
            
            const todayStr = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
            if(document.getElementById('display-date')) document.getElementById('display-date').innerText = todayStr;
            if(document.getElementById('daily-q-text')) document.getElementById('daily-q-text').innerText = data.config?.question || "오늘 하루 어땠나요?";
        });

        function renderHome(calObj) {
            const today = new Date();
            const diffStart = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const diffEnd = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById('d-day-start').innerText = diffStart > 0 ? diffStart : 0;
            document.getElementById('d-day-end').innerText = diffEnd > 0 ? diffEnd : 0;
            const container = document.getElementById('cal-list');
            if(!container) return;
            container.innerHTML = '';
            const threeWeeks = new Date(); threeWeeks.setDate(today.getDate() + 21);
            const sorted = Object.entries(calObj).filter(([id, c]) => { const d = new Date(c.date); return d >= today && d <= threeWeeks; }).sort((a,b) => new Date(a[1].date) - new Date(b[1].date));
            if(sorted.length === 0) container.innerHTML = "<p class='empty-msg'>3주 내 일정이 없습니다.</p>";
            sorted.forEach(([id, c]) => { container.innerHTML += `<div class="compact-cal-item"><b>${c.date.slice(5)}</b> <span>${c.title}</span></div>`; });
        }

        function renderMileage(mileageObj) {
            const tbody = document.getElementById('mileage-rank-list');
            const totalDisplay = document.getElementById('total-sum');
            const totalBar = document.getElementById('total-bar-fill');
            if(!tbody) return;
            tbody.innerHTML = '';
            let classTotal = 0;
            const sorted = Object.entries(mileageObj).sort((a,b) => b[1]-a[1]);
            sorted.forEach(([name, score], idx) => {
                classTotal += (score > 0 ? score : 0);
                tbody.innerHTML += `<div class="list-item"><span>${idx+1}위. ${name}</span> <strong>${score} P</strong></div>`;
            });
            if(totalDisplay) totalDisplay.innerText = classTotal.toLocaleString();
            if(totalBar) totalBar.style.width = Math.min((classTotal/3000)*100, 100) + "%";
        }

        function renderPraise(praiseObj) {
            const container = document.getElementById('praise-view-list');
            if(!container) return;
            container.innerHTML = '';
            Object.values(praiseObj).filter(p => p.approved).reverse().forEach(p => {
                container.innerHTML += `<div class="glass-card praise-card"><b>${p.to}</b> 친구 칭찬!<br><p>${p.content}</p><small>- ${p.from}</small></div>`;
            });
        }

        function renderToday(impObj) {
            const container = document.getElementById('today-view-list');
            if(!container) return;
            container.innerHTML = '';
            const grouped = {};
            Object.values(impObj).forEach(i => { if(!grouped[i.date]) grouped[i.date] = { q: i.question, a: [] }; grouped[i.date].a.push(i); });
            Object.entries(grouped).reverse().forEach(([date, data]) => {
                let html = `<div class='date-group'><h4>📅 ${date}</h4><p class='q-box'>Q. ${data.q}</p>`;
                data.a.forEach(ans => { html += `<div class='ans-item'><b>${ans.name}</b>: ${ans.content}</div>`; });
                container.innerHTML += html + `</div>`;
            });
        }

        // --- 관리자 제어 기능 ---
        function renderAdminTools(data) {
            const stSelect = document.getElementById('adm-m-st-select');
            const pending = document.getElementById('adm-praise-pending');
            const todayList = document.getElementById('adm-today-list');

            if(stSelect) {
                stSelect.innerHTML = '<option value="">학생 선택</option>';
                Object.keys(data.students || {}).sort().forEach(name => { stSelect.innerHTML += `<option value="${name}">${name}</option>`; });
            }
            if(pending) {
                pending.innerHTML = '';
                Object.entries(data.praise || {}).forEach(([id, p]) => {
                    if(!p.approved) pending.innerHTML += `<div class='list-item'>[${p.from}→${p.to}] ${p.content} <button onclick="approvePraise('${id}','${p.from}','${p.to}')">승인</button></div>`;
                });
            }
            if(todayList) {
                todayList.innerHTML = '';
                Object.entries(data.impression || {}).forEach(([id, i]) => {
                    todayList.innerHTML += `<div class='list-item' style='font-size:0.8rem'>${i.date} ${i.name} <button onclick="deleteItem('impression','${id}')">삭제</button></div>`;
                });
            }
            // 어드민 설정창 값 세팅
            if(data.config) {
                document.getElementById('adm-reasons-input').value = data.config.reasons || "";
                document.getElementById('adm-rewards-input').value = data.config.rewards || "";
            }
        }

        window.updateConfig = () => {
            const reasons = document.getElementById('adm-reasons-input').value;
            const rewards = document.getElementById('adm-rewards-input').value;
            update(ref(db, 'class306/config'), { reasons, rewards });
            alert("적립 및 보상 설정이 저장되었습니다!");
        };

        window.processMileage = (type) => {
            const name = document.getElementById('adm-m-st-select').value;
            const score = parseInt(document.getElementById('adm-m-score').value);
            if(!name || isNaN(score)) return alert("학생과 점수를 확인하세요.");
            const mRef = ref(db, `class306/mileage/${name}`);
            onValue(mRef, s => { const cur = s.val() || 0; set(mRef, type === 'add' ? cur + score : cur - score); }, {onlyOnce:true});
            alert("완료!");
        };

        window.groupMileage = (score, reason) => { if(confirm(`${reason} 단체 점수 ${score}점을 부여할까요?`)) { const mRef = ref(db, 'class306/mileage'); onValue(mRef, snap => { const cur = snap.val() || {}; const updates = {}; studentList.forEach(name => { updates[name] = (cur[name] || 0) + score; }); update(mRef, updates); }, {onlyOnce:true}); } };

        window.approvePraise = (id, from, to) => {
            update(ref(db, `class306/praise/${id}`), { approved: true });
            const mRef = ref(db, 'class306/mileage');
            onValue(mRef, snap => { const cur = snap.val() || {}; update(mRef, { [from]: (cur[from]||0)+1, [to]: (cur[to]||0)+2 }); }, {onlyOnce:true});
        };

        window.deleteItem = (path, id) => { if(confirm("삭제하시겠습니까?")) remove(ref(db, `class306/${path}/${id}`)); };
        window.resetData = (path) => { if(confirm(`${path} 데이터를 모두 초기화하시겠습니까?`)) remove(ref(db, `class306/${path}`)); };
        window.submitPraise = () => { const from = document.getElementById('p-from').value; const to = document.getElementById('p-to').value; const content = document.getElementById('p-content').value; if(!from || !to || !content) return alert("빈칸을 채워주세요."); push(ref(db, 'class306/praise'), { from, to, content, approved: false, time: new Date().toLocaleString() }); alert("제보 완료!"); };
        window.submitToday = () => { const name = document.getElementById('t-name').value; const content = document.getElementById('t-content').value; if(!name || !content) return alert("내용을 입력하세요."); push(ref(db, 'class306/impression'), { name, content, question: document.getElementById('daily-q-text').innerText, date: new Date().toLocaleDateString() }); const mRef = ref(db, `class306/mileage/${name}`); onValue(mRef, s => set(mRef, (s.val()||0)+1), {onlyOnce:true}); alert("기록 완료!"); };
        window.syncClass = () => { studentList.forEach(name => set(ref(db, `class306/students/${name}`), true)); alert("동기화 완료!"); };
        window.addBulkCal = () => { const lines = document.getElementById('adm-cal-bulk').value.split('\n'); lines.forEach(line => { const [date, title] = line.split(':').map(s => s.trim()); if(date && title) push(ref(db, 'class306/calendar'), { date, title }); }); alert("등록 완료!"); };
        window.autoGenQ = () => { document.getElementById('adm-q-input').value = ["오늘 가장 웃겼던 일?", "오늘 나에게 하고 싶은 말?", "오늘 수업 중 기억나는 것?"][Math.floor(Math.random()*3)]; };
        window.updateQ = () => { const q = document.getElementById('adm-q-input').value; if(q) set(ref(db, 'class306/config/question'), q); };

    </script>
    <style>
        :root { --mint: #98FFD9; --pink: #FFC2D1; --header-grad: linear-gradient(135deg, #FF6B6B 0%, #FFD93D 100%); }
        body { font-family: 'Pretendard', sans-serif; background: #fafafa; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #444; }
        header { padding: 40px 0 20px; text-align: center; width: 100%; }
        h1 { font-weight: 900; font-size: 3.2rem; margin: 0; background: var(--header-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.15)); }
        nav { display: flex; gap: 8px; margin-bottom: 20px; }
        nav button { padding: 12px 18px; border: none; border-radius: 20px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; font-weight: 700; color: #888; }
        nav button.active { background: #333; color: white; }

        /* 전역 마일리지 배너 */
        .class-total-banner { width: 90%; max-width: 700px; background: white; padding: 18px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .total-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 800; font-size: 0.95rem; }
        .progress-bar { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: var(--header-grad); height: 100%; width: 0%; transition: 1s ease; }

        .content-section { display: none; width: 95%; max-width: 700px; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        .sub-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .sub-nav button { background: none; border: none; font-size: 1rem; color: #bbb; cursor: pointer; font-weight: 700; padding-bottom: 5px; }
        .sub-nav button.active { color: #333; border-bottom: 3px solid var(--mint); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4); border-radius: 30px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .compact-cal-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f2f2f2; }
        .compact-cal-item b { width: 55px; color: #ff6b6b; font-size: 0.85rem; }
        .compact-cal-item span { font-weight: 600; font-size: 0.95rem; }

        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; font-family: inherit; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 15px; background: var(--header-grad); color: white; font-weight: 800; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .admin-box { background: #fcfcfc; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .admin-box h4 { margin-top: 0; color: #ff6b6b; margin-bottom: 10px; }
        .display-box { background: #fff9e6; padding: 20px; border-radius: 20px; border-left: 5px solid #FFD93D; text-align: left; margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header><h1>INTO THE 306 WORLD</h1></header>

<nav>
    <button onclick="showSection('home')" id="btn-home" class="active">홈</button>
    <button onclick="showSection('mileage')" id="btn-mileage">마일리지</button>
    <button onclick="showSection('praise')" id="btn-praise">칭찬감옥</button>
    <button onclick="showSection('today')" id="btn-today">오늘 하루</button>
    <button onclick="showSection('admin')" id="btn-admin" style="color:#FF6B6B">관리자</button>
</nav>

<div class="class-total-banner">
    <div class="total-info">
        <span>306 마일리지 누적 합계</span>
        <span><span id="total-sum">0</span> / 3,000 P</span>
    </div>
    <div class="progress-bar"><div id="total-bar-fill" class="progress-fill"></div></div>
</div>

<section id="home" class="content-section active">
    <div class="glass-card">
        <div style="display:flex; justify-content: space-around; margin-bottom: 15px; font-weight: 800; font-size: 0.9rem;">
            <div>함께한 지 <span id="d-day-start" style="color:#ff6b6b">0</span>일</div>
            <div>졸업까지 <span id="d-day-end" style="color:#ff6b6b">0</span>일</div>
        </div>
        <h4 style="text-align:center; border-bottom: 1px solid #eee; padding-bottom: 8px; margin:0 0 10px 0;">306 일정</h4>
        <div id="cal-list"></div>
    </div>
</section>

<section id="mileage" class="content-section">
    <div class="sub-nav"><button class="active" onclick="showSubTab(this,'mileage','m-guide')">적립 및 보상</button><button onclick="showSubTab(this,'mileage','m-view')">실시간 랭킹</button></div>
    
    <div id="m-guide" class="tab-content active">
        <div class="glass-card">
            <h3 style="margin-top:0; color:#333; text-align:center;">📝 적립 방법</h3>
            <div id="display-reasons" class="display-box"></div>
            
            <h3 style="margin-top:20px; color:#ff6b6b; text-align:center;">🎁 달성 보상</h3>
            <div id="display-rewards" class="display-box" style="background:#fff0f3; border-left-color:#ff85a1;"></div>
        </div>
    </div>
    <div id="m-view" class="tab-content"><div class="glass-card"><h2>🏆 실시간 랭킹</h2><div id="mileage-rank-list"></div></div></div>
</section>

<section id="praise" class="content-section">
    <div class="sub-nav"><button class="active" onclick="showSubTab(this,'praise','p-form')">제보하기</button><button onclick="showSubTab(this,'praise','p-list')">모아보기</button></div>
    <div id="p-form" class="tab-content active"><div class="glass-card"><h2>친구 칭찬 제보</h2><input type="text" id="p-from" placeholder="제보자 이름"><input type="text" id="p-to" placeholder="칭찬 주인공"><textarea id="p-content" rows="3" placeholder="내용을 입력하세요."></textarea><button class="btn-main" onclick="submitPraise()">보내기</button></div></div>
    <div id="p-list" class="tab-content"><div id="praise-view-list"></div></div>
</section>

<section id="today" class="content-section">
    <div class="sub-nav"><button class="active" onclick="showSubTab(this,'today','t-form')">오늘의 질문</button><button onclick="showSubTab(this,'today','t-list')">모아보기</button></div>
    <div id="t-form" class="tab-content active"><div class="glass-card"><div id="display-date" style="text-align:center; color:#999; margin-bottom:5px;"></div><div class="q-box" style="padding:15px; margin-bottom:15px; background:#fff9e6;"><h4 id="daily-q-text" style="margin:0; text-align:center;">로딩 중...</h4></div><input type="text" id="t-name" placeholder="이름"><textarea id="t-content" rows="3" placeholder="오늘의 인상을 기록하세요."></textarea><button class="btn-main" onclick="submitToday()">기록하기</button></div></div>
    <div id="t-list" class="tab-content"><div id="today-view-list"></div></div>
</section>

<section id="admin" class="content-section">
    <div class="glass-card">
        <h2 style="color:#FF6B6B">선생님 관리 도구</h2>
        
        <div class="admin-box">
            <h4>1. 적립 및 보상 설정 관리</h4>
            <p style="font-size:0.8rem; color:#888;">적립 방법 내용을 입력하세요 (한 줄에 하나씩)</p>
            <textarea id="adm-reasons-input" rows="4" placeholder="칭찬제보: +1P..."></textarea>
            <p style="font-size:0.8rem; color:#888;">보상 내용을 입력하세요 (한 줄에 하나씩)</p>
            <textarea id="adm-rewards-input" rows="4" placeholder="5P: 까까..."></textarea>
            <button onclick="updateConfig()" class="btn-main">설정 저장하기</button>
        </div>

        <div class="admin-box">
            <h4>2. 마일리지 관리</h4>
            <select id="adm-m-st-select"></select>
            <input type="number" id="adm-m-score" placeholder="점수">
            <button onclick="processMileage('add')">적립</button>
            <button onclick="processMileage('sub')" style="background:#ff6b6b; color:white;">감점/사용</button>
            <button onclick="groupMileage(2, '지각자 없음')" style="background:#37ecba; color:white;">단체 +2 적립</button>
            <button onclick="resetData('mileage')" style="background:#333; color:white;">랭킹 초기화</button>
        </div>
        
        <div class="admin-box">
            <h4>3. 게시물 관리</h4>
            <div id="adm-praise-pending" style="border-bottom:1px solid #ddd; padding-bottom:10px; margin-bottom:10px;"></div>
            <div id="adm-today-list" style="max-height:100px; overflow-y:auto;"></div>
            <button onclick="resetData('praise')" style="width:48%;">칭찬 전체삭제</button>
            <button onclick="resetData('impression')" style="width:48%;">오늘하루 전체삭제</button>
        </div>

        <div class="admin-box">
            <h4>4. 시스템 설정</h4>
            <button onclick="syncClass()">학생 명단 동기화</button>
            <textarea id="adm-cal-bulk" rows="2" placeholder="2026-05-01: 소풍 (엔터로 구분)"></textarea><button onclick="addBulkCal()">일정 등록</button>
            <hr>
            <input type="text" id="adm-q-input" placeholder="새로운 질문"><button onclick="autoGenQ()">랜덤</button><button onclick="updateQ()">변경</button>
        </div>
    </div>
</section>

</body>
</html>
